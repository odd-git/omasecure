# Omablue Bluetooth Auto-Connect Configuration
# This file is sourced by omablue-bluetooth-autoconnect

# Send a notification when a device is auto-connected
NOTIFY_ON_CONNECT=true

# Send a notification when a connection attempt fails
NOTIFY_ON_FAILURE=false

# Seconds to wait before retrying a failed connection (default: 300 = 5 min)
RETRY_INTERVAL=300

# Auto-switch audio output to the connected Bluetooth device (requires pw-dump, wpctl)
SWITCH_AUDIO=true

# Seconds to wait after connect command before declaring failure (grace period for BlueZ handshake)
POST_CONNECT_WAIT=12

# Seconds between each connection state poll during grace window
POST_CONNECT_POLL=2
