---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: omasecure
description: Security-focused Origami Linux image with Trivalent, niri, and audio production tools.

base-image: registry.gitlab.com/origami-linux/images/origami
image-version: latest

modules:
  # Deploy system config files (sysusers.d for audio group, etc.)
  - type: files
    files:
      - source: system
        destination: /

  # Package management: add repos, install and remove packages
  - type: dnf
    repos:
      files:
        # Trivalent (hardened Chromium) and other secureblue packages
        - https://repo.secureblue.dev/secureblue.repo
    install:
      packages:
        # Default browser (hardened Chromium from secureblue)
        - trivalent
        # Wayland compositor
        - niri
        # Application launcher (Wayland-native)
        - rofi-wayland
        # Status bar
        - waybar
        # Shell prompt
        - starship
        # Screen recorder / streaming
        - obs-studio
        # Video editor
        - kdenlive
        # Terminal emulator
        - ghostty
        # KVM virtualization stack
        - qemu-kvm
        - libvirt
        - libvirt-daemon-config-network
        - virt-manager
        - virt-install
        - virt-viewer
    remove:
      packages:
        # Replaced by Trivalent
        - firefox
        - firefox-langpacks

  # System-wide flatpaks (Flathub)
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.gnome.Loupe
      - scope: user

  # Signing policy for the published image
  - type: signing
